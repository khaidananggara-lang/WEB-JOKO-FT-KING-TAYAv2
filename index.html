<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING TAYA STORE | JOKO FT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4757; --secondary: #2f3542; --accent: #2ed573; --bg: #f4f6f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); }
        
        /* NAVBAR */
        nav { background: var(--secondary); color: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 20px; }
        .logo span { color: var(--primary); }

        /* GRID */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .product-card { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .product-img { background: #000; color: #fff; height: 100px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 8px; margin-bottom: 10px; }
        .btn-group { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        button { cursor: pointer; border: none; padding: 8px; border-radius: 5px; font-weight: 600; }
        .cart-btn { background: #eee; color: #333; }
        .instant-btn { background: var(--primary); color: #fff; }

        /* MODAL CUSTOM UI */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; align-items:center; justify-content:center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .opt-btn { background: #f1f1f1; padding: 15px; border-radius: 10px; font-weight: 800; font-size: 18px; }
        .back-btn { background: #747d8c; color: #fff; width: 100%; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">KING TAYA<span>STORE</span></div>
        <div onclick="toggleCart()" style="cursor:pointer">🛒 Keranjang (<span id="cart-count">0</span>)</div>
    </nav>

    <div class="container">
        <h2>List Paket JOKO FT</h2>
        <div class="products-grid" id="productGrid">
            <!-- Produk akan di-generate otomatis oleh JS -->
        </div>
    </div>

    <!-- MODAL PILIH OPSI (11/22/33/44) -->
    <div class="modal-overlay" id="optionModal">
        <div class="modal-content">
            <h3>Pilih Opsi Main Lu!</h3>
            <div class="opt-grid">
                <button class="opt-btn" onclick="executeOrder('11')">11</button>
                <button class="opt-btn" onclick="executeOrder('22')">22</button>
                <button class="opt-btn" onclick="executeOrder('33')">33</button>
                <button class="opt-btn" onclick="executeOrder('44')">44</button>
            </div>
            <button class="back-btn" onclick="closeModal()">← KEMBALI</button>
        </div>
    </div>

    <script>
        // --- DATA PRODUK (Tinggal tambah di sini!) ---
        const produkList = [
            { id: 1, name: "Paket #1", price: 500 },
            { id: 2, name: "Paket #2", price: 750 },
            { id: 3, name: "Paket #3", price: 1000 },
            { id: 4, name: "Paket #4", price: 1500 },
            { id: 5, name: "Paket #5", price: 2000 },
            { id: 6, name: "Paket #6", price: 2500 },
            { id: 7, name: "Paket #7", price: 3000 },
            { id: 8, name: "Paket #8", price: 3500 },
            { id: 9, name: "Paket #9", price: 4000 },
            { id: 10, name: "Paket #10", price: 4500 },
            { id: 11, name: "Paket #11", price: 5000 }
        ];

        let cart = [];
        let pendingItem = null; // Menyimpan data sementara untuk modal

        // Render Produk
        const grid = document.getElementById('productGrid');
        grid.innerHTML = produkList.map(item => `
            <div class="product-card">
                <div class="product-img">${item.price >= 1000 ? (item.price/1000)+'K' : item.price+'P'}</div>
                <h3>${item.name}</h3>
                <div class="btn-group">
                    <button class="cart-btn" onclick="addToCart(${item.id})">Tambah</button>
                    <button class="instant-btn" onclick="openModal('${item.name}', ${item.price})">Beli</button>
                </div>
            </div>
        `).join('');

        function openModal(name, price) {
            pendingItem = { name, price };
            document.getElementById('optionModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('optionModal').classList.remove('active');
        }

        function executeOrder(opsi) {
            let msg = `WOI KING, gw mau order ${pendingItem.name} (${pendingItem.price}), Main nya ${opsi}, dibales ya KING`;
            window.open(`https://wa.me/6285954684314?text=${encodeURIComponent(msg)}`, '_blank');
            closeModal();
        }

        function addToCart(id) {
            cart.push(id);
            document.getElementById('cart-count').innerText = cart.length;
            alert("Masuk keranjang!");
        }

        function toggleCart() {
            alert("Keranjang total: " + cart.length + " item.");
        }
    </script>
</body>
</html>
